<section id="home" class="relative min-h-screen flex items-center bg-gradient-mesh overflow-hidden pt-20">
  <!-- Decorative Background Elements -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-20 right-10 w-72 h-72 bg-primary-600/10 rounded-full blur-3xl animate-float"></div>
    <div class="absolute bottom-20 left-10 w-96 h-96 bg-primary-500/5 rounded-full blur-3xl animate-float" style="animation-delay: 1s;"></div>
  </div>

  <div class="container mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <ng-container *ngIf="portfolio$ | async as portfolio">
    <div class="grid lg:grid-cols-2 gap-12 items-center">
      <!-- Content Left -->
      <div class="space-y-6 animate-slide-up">
        

        <!-- Main Title -->
        <div class="space-y-4">
          <h2 class="text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-display font-bold leading-tight text-dark-100">
          
            <span class="block bg-gradient-to-r from-primary-400 to-primary-600 bg-clip-text text-transparent">
              {{ portfolio.personalInfo.name }}
            </span>
          </h2>
          <p class="text-2xl sm:text-3xl md:text-4xl font-display font-semibold text-dark-300">
            {{ portfolio.personalInfo.title }}
          </p>
        </div>

        

        <!-- Tech Stack Pills -->
        <div class="flex flex-wrap gap-3">
          <span class="px-4 py-2 rounded-lg bg-dark-800/50 border border-dark-700 text-dark-300 text-sm font-medium hover:border-primary-600/50 hover:bg-primary-600/10 transition-all">
            Java
          </span>
          <span class="px-4 py-2 rounded-lg bg-dark-800/50 border border-dark-700 text-dark-300 text-sm font-medium hover:border-primary-600/50 hover:bg-primary-600/10 transition-all">
            Spring Boot
          </span>
          <span class="px-4 py-2 rounded-lg bg-dark-800/50 border border-dark-700 text-dark-300 text-sm font-medium hover:border-primary-600/50 hover:bg-primary-600/10 transition-all">
            Angular
          </span>
           <span class="px-4 py-2 rounded-lg bg-dark-800/50 border border-dark-700 text-dark-300 text-sm font-medium hover:border-primary-600/50 hover:bg-primary-600/10 transition-all">
            Typescript
          </span>
          <span class="px-4 py-2 rounded-lg bg-dark-800/50 border border-dark-700 text-dark-300 text-sm font-medium hover:border-primary-600/50 hover:bg-primary-600/10 transition-all">
            Javascript
          </span>
          <span class="px-4 py-2 rounded-lg bg-dark-800/50 border border-dark-700 text-dark-300 text-sm font-medium hover:border-primary-600/50 hover:bg-primary-600/10 transition-all">
            Node.js
          </span>
           <span class="px-4 py-2 rounded-lg bg-dark-800/50 border border-dark-700 text-dark-300 text-sm font-medium hover:border-primary-600/50 hover:bg-primary-600/10 transition-all">
            Html
          </span>
           <span class="px-4 py-2 rounded-lg bg-dark-800/50 border border-dark-700 text-dark-300 text-sm font-medium hover:border-primary-600/50 hover:bg-primary-600/10 transition-all">
            CSS
          </span>
          <span class="px-4 py-2 rounded-lg bg-dark-800/50 border border-dark-700 text-dark-300 text-sm font-medium hover:border-primary-600/50 hover:bg-primary-600/10 transition-all">
            Python
          </span>
          
        </div>

        <!-- CTA Buttons -->
        <div class="flex flex-wrap gap-4 pt-4">
          <a href="#projects"             class="inline-flex items-center gap-2 px-8 py-4 border-2 border-dark-700 hover:border-primary-600 text-dark-100 hover:text-primary-500 font-semibold rounded-xl transition-all duration-300">
            {{ 'hero.viewProjects' | translate }}
          </a>
          <a
            [href]="portfolio.personalInfo.cv || '/files/CV Yosra Rhouma_Développeur Full-stack.pdf'"
            download="Yosra_Rhouma_CV.pdf"
            target="_blank"
            rel="noopener"
            class="inline-flex items-center gap-2 px-8 py-4 border-2 border-dark-700 hover:border-primary-600 text-dark-100 hover:text-primary-500 font-semibold rounded-xl transition-all duration-300"
          >
            {{ 'hero.downloadCV' | translate }}
          </a>
          <!-- Social Links -->
        <div class="flex gap-4 pt-2">
          <a 
            href="https://www.linkedin.com/in/yosra-rhouma-962b72244/" 
            target="_blank"
            rel="noopener noreferrer"
            class="w-12 h-12 flex items-center justify-center rounded-lg bg-dark-800/50 border border-dark-700 hover:border-primary-600/50 hover:bg-primary-600/10 text-dark-400 hover:text-primary-500 transition-all duration-300"
            aria-label="LinkedIn"
          >
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </a>
          <a 
            href="https://github.com/YosRhouma" 
            target="_blank"
            rel="noopener noreferrer"
            class="w-12 h-12 flex items-center justify-center rounded-lg bg-dark-800/50 border border-dark-700 hover:border-primary-600/50 hover:bg-primary-600/10 text-dark-400 hover:text-primary-500 transition-all duration-300"
            aria-label="GitHub"
          >
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
          </a>
        
        </div>
        </div>

        
      </div>

      <!-- Image Right -->
      <div class="relative flex justify-center lg:justify-end animate-slide-up" style="animation-delay: 0.2s;">
        <div class="relative">
          <!-- Decorative Ring -->
          <div class="absolute inset-0 rounded-full bg-gradient-to-br from-primary-600/20 to-primary-800/20 blur-2xl animate-glow"></div>
          
          <!-- Photo Container (shows avatar if set, otherwise fallback image) -->
          <div class="relative w-80 h-80 md:w-96 md:h-96 rounded-full overflow-hidden border-4 border-primary-600/30 shadow-2xl shadow-primary-600/20">
            <img [src]="portfolio.personalInfo.avatar || '/images/yos.jpg'" 
                 [alt]="portfolio.personalInfo.name || 'Profile'" 
                 class="w-full h-full object-cover block"/>
          </div>

          <!-- Floating Badge -->
          <!-- <div class="absolute -bottom-3 -right-4 bg-dark-900 border border-primary-600 rounded-xl px-3 py-2 shadow-lg">
            <div class="text-center">
              <p class="text-xl font-bold bg-gradient-to-r from-primary-400 to-primary-600 bg-clip-text text-transparent">
                2+
              </p>
              <p class="text-[10px] text-dark-400 font-medium">
                Années d'expérience
              </p>
            </div>
          </div> -->

        </div>
      </div>
    </div>

    <!-- Scroll Indicator -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 animate-bounce">
      <a href="#about" class="flex flex-col items-center gap-2 text-dark-400 hover:text-primary-500 transition-colors">
        <span class="text-sm font-medium">Défiler</span>
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
        </svg>
      </a>
    </div>
    </ng-container>
  </div>
</section>

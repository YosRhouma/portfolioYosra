<section id="skills" class="relative py-20 lg:py-32 overflow-hidden">
  <!-- Background -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/2 right-0 w-96 h-96 bg-primary-600/5 rounded-full blur-3xl"></div>
  </div>

  <div class="container mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <!-- Header -->
    <div class="text-center mb-16 animate-slide-up">
      <h2 class="text-4xl md:text-5xl font-display font-bold text-dark-100 mb-4">Compétences</h2>
      <div class="w-16 h-1 bg-gradient-to-r from-primary-400 to-primary-600 mx-auto"></div>
    </div>

    <!-- Category Filter -->
    <div class="flex flex-wrap justify-center gap-3 mb-12 animate-slide-up">
      <button 
        *ngFor="let category of categories"
        (click)="selectCategory(category)"
        [class.active]="selectedCategory === category"
        class="px-6 py-2 rounded-lg border transition-all duration-300"
        [ngClass]="selectedCategory === category 
          ? 'bg-primary-600 border-primary-600 text-white' 
          : 'border-dark-700 text-dark-300 hover:border-primary-600'"
      >
        {{ category }}
      </button>
    </div>

    <!-- Skills Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-slide-up">
      <!-- All skills if no category selected -->
      <div *ngIf="!selectedCategory">
        <div *ngFor="let skill of skills" 
             class="p-6 rounded-xl bg-dark-800/30 border border-dark-700/50 hover:border-primary-600/30 transition-all group">
          <div class="flex items-start justify-between mb-3">
            <h3 class="text-lg font-semibold text-dark-100 group-hover:text-primary-400 transition-colors">
              {{ skill.name }}
            </h3>
            <span class="px-3 py-1 rounded-full bg-primary-600/10 text-primary-400 text-xs font-medium">
              {{ skill.level }}
            </span>
          </div>
          <p class="text-sm text-dark-400">{{ skill.category }}</p>
          <div class="mt-3 flex items-center gap-2">
            <div class="flex-1 h-2 bg-dark-700 rounded-full overflow-hidden">
              <div 
                class="h-full bg-gradient-to-r from-primary-500 to-primary-600"
                [style.width]="skill.years ? (skill.years * 25) + '%' : '75%'"
              ></div>
            </div>
            <span class="text-xs text-dark-400" *ngIf="skill.years">{{ skill.years }}y</span>
          </div>
        </div>
      </div>

      <!-- Filtered by category -->
      <div *ngIf="selectedCategory">
        <div *ngFor="let skill of getSkillsByCategory(selectedCategory)" 
             class="p-6 rounded-xl bg-dark-800/30 border border-dark-700/50 hover:border-primary-600/30 transition-all group animate-scale-in">
          <div class="flex items-start justify-between mb-3">
            <h3 class="text-lg font-semibold text-dark-100 group-hover:text-primary-400 transition-colors">
              {{ skill.name }}
            </h3>
            <span class="px-3 py-1 rounded-full bg-primary-600/10 text-primary-400 text-xs font-medium">
              {{ skill.level }}
            </span>
          </div>
          <div class="mt-3 flex items-center gap-2">
            <div class="flex-1 h-2 bg-dark-700 rounded-full overflow-hidden">
              <div 
                class="h-full bg-gradient-to-r from-primary-500 to-primary-600 transition-all duration-500"
                [style.width]="skill.years ? (skill.years * 25) + '%' : '75%'"
              ></div>
            </div>
            <span class="text-xs text-dark-400" *ngIf="skill.years">{{ skill.years }}y</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats Section -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mt-20 animate-slide-up">
      <div class="p-6 rounded-xl bg-dark-800/30 border border-dark-700/50 text-center">
        <p class="text-3xl font-bold text-gradient mb-2">{{ skills.length }}</p>
        <p class="text-sm text-dark-400">Compétences</p>
      </div>
      <div class="p-6 rounded-xl bg-dark-800/30 border border-dark-700/50 text-center">
        <p class="text-3xl font-bold text-gradient mb-2">5</p>
        <p class="text-sm text-dark-400">Catégories</p>
      </div>
      <div class="p-6 rounded-xl bg-dark-800/30 border border-dark-700/50 text-center">
        <p class="text-3xl font-bold text-gradient mb-2">3+</p>
        <p class="text-sm text-dark-400">Années Exp</p>
      </div>
      <div class="p-6 rounded-xl bg-dark-800/30 border border-dark-700/50 text-center">
        <p class="text-3xl font-bold text-gradient mb-2">100%</p>
        <p class="text-sm text-dark-400">Dédication</p>
      </div>
    </div>
  </div>
</section>

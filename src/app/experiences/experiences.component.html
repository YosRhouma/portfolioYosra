<section id="experiences" class="relative py-20 lg:py-32 overflow-hidden">
  <!-- Background -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/3 right-0 w-96 h-96 bg-primary-600/5 rounded-full blur-3xl"></div>
  </div>

  <div class="container mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <!-- Header -->
    <div class="text-center mb-16 animate-slide-up">
      <h2 class="text-4xl md:text-5xl font-display font-bold text-dark-100 mb-4">Expériences Professionnelles</h2>
      <div class="w-16 h-1 bg-gradient-to-r from-primary-400 to-primary-600 mx-auto"></div>
    </div>

    <!-- Timeline -->
    <div class="max-w-4xl mx-auto animate-slide-up">
      <div *ngFor="let exp of experiences; let i = index" class="relative mb-12">
        <!-- Timeline line -->
        <div *ngIf="i < experiences.length - 1" class="absolute left-8 top-24 bottom-0 w-1 bg-gradient-to-b from-primary-600 to-dark-700"></div>

        <!-- Timeline dot -->
        <div class="absolute left-0 top-0 w-16 h-16 flex items-center justify-center">
          <div class="absolute w-16 h-16 bg-primary-600/10 rounded-full"></div>
          <div class="absolute w-8 h-8 bg-primary-600 rounded-full border-4 border-dark-900"></div>
        </div>

        <!-- Content -->
        <div class="ml-32">
          <div class="p-8 rounded-xl bg-dark-800/30 border border-dark-700/50 hover:border-primary-600/30 transition-all cursor-pointer" (click)="toggleExpanded(exp.id)" [class.border-primary-600\50]='expandedId === exp.id'>
            <!-- Header -->
            <div class="flex items-start justify-between">
              <div class="flex-grow">
                <h3 class="text-xl font-semibold text-dark-100 mb-1">{{ exp.position }}</h3>
                <p class="text-primary-400 font-medium">{{ exp.company }}</p>
                <p class="text-sm text-dark-400 mt-1">
                  {{ formatDate(exp.startDate) }} - 
                  <span *ngIf="exp.current" class="text-primary-500">Actuellement</span>
                  <span *ngIf="!exp.current">{{ formatDate(exp.endDate!) }}</span>
                  <span *ngIf="exp.location" class="text-dark-500"> • {{ exp.location }}</span>
                </p>
              </div>
              <svg class="w-6 h-6 text-dark-400 transition-transform duration-300" [class.rotate-180]="expandedId === exp.id" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
              </svg>
            </div>

            <!-- Description (always visible) -->
            <p class="text-dark-300 mt-4">{{ exp.description }}</p>

            <!-- Expanded content -->
            <div *ngIf="expandedId === exp.id" class="mt-6 space-y-4 animate-slide-down">
              <!-- Achievements -->
              <div>
                <h4 class="text-primary-400 font-semibold mb-3">Accomplissements clés:</h4>
                <ul class="space-y-2">
                  <li *ngFor="let achievement of exp.achievements" class="flex gap-3 text-dark-400 text-sm">
                    <svg class="w-5 h-5 text-primary-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                    </svg>
                    <span>{{ achievement }}</span>
                  </li>
                </ul>
              </div>

              <!-- Technologies -->
              <div>
                <h4 class="text-primary-400 font-semibold mb-3">Technologies utilisées:</h4>
                <div class="flex flex-wrap gap-2">
                  <span *ngFor="let tech of exp.technologies" class="px-3 py-1 rounded-full bg-primary-600/10 text-primary-400 text-xs font-medium">{{ tech }}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
